name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /usr/share/nginx/html/*
            cd /tmp
            git clone https://github.com/a28305/breakout-web.git
            sudo cp -r /tmp/breakout-web/* /usr/share/nginx/html/
            sudo rm -rf /tmp/breakout-web
            sudo systemctl restart nginx